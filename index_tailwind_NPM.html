<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Page Title</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

<!--
 Tailwind를 CDN 방식으로 사용할 때는 별도의 CSS 파일을 만들지 않는다.
 HTML 태그에 Tailwind 클래스를 직접 여러 개 작성하는 것이 정상적인 사용 방식이다.
 스타일을 class 조합으로 표현하도록 권장한다.
-->
    
  </head>
  <body class="bg-white">

    <!-- 신상품 -->
    <div id="product"
         class="w-[1000px] h-[800px] mx-auto border-2 border-gray-300 p-4">

      <h3 class="text-[20px] text-green-600 text-center leading-[50px] tracking-[10px] font-semibold">
        오늘의 상품
      </h3>

      <p class="text-[17px] text-black text-center leading-[30px] mb-6">
        새로운 상품을 만나 보세요.
      </p>

      <!-- 상품 박스 8개 -->
      <div class="grid grid-cols-4 gap-x-6 gap-y-8">

        <div class="box w-[200px] h-[300px] border border-gray-300 rounded-2xl p-2 overflow-hidden text-center hover:shadow-md"></div>
        <div class="box w-[200px] h-[300px] border border-gray-300 rounded-2xl p-2 overflow-hidden text-center hover:shadow-md"></div>
        <div class="box w-[200px] h-[300px] border border-gray-300 rounded-2xl p-2 overflow-hidden text-center hover:shadow-md"></div>
        <div class="box w-[200px] h-[300px] border border-gray-300 rounded-2xl p-2 overflow-hidden text-center hover:shadow-md"></div>
        <div class="box w-[200px] h-[300px] border border-gray-300 rounded-2xl p-2 overflow-hidden text-center hover:shadow-md"></div>
        <div class="box w-[200px] h-[300px] border border-gray-300 rounded-2xl p-2 overflow-hidden text-center hover:shadow-md"></div>
        <div class="box w-[200px] h-[300px] border border-gray-300 rounded-2xl p-2 overflow-hidden text-center hover:shadow-md"></div>
        <div class="box w-[200px] h-[300px] border border-gray-300 rounded-2xl p-2 overflow-hidden text-center hover:shadow-md"></div>

      </div>
    </div>

    <!-- 데이터 로딩 JS -->
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const response = await fetch("https://dino-21.github.io/Shopping_Site/json/product.json");
          if (!response.ok) throw new Error("데이터를 불러오는 데 실패했습니다.");

          const data = await response.json();

          if (data.length > 0) {
            data.forEach((item, i) => {
              const box = document.querySelectorAll(".box")[i];

              box.innerHTML = `
              <a href="#">
              <img src="img/${item.url}"
              class="w-full h-[200px] rounded-2xl object-cover"/>
                    </a>

              <h4 class="mt-2">
              <a href="#" class="text-[13px] hover:text-green-600">${item.title}</a>
                    </h4>

              <span class="text-[12px] mt-1 inline-block relative">
              ${item.price}

              <span class="absolute right-[-30px] top-[-5px] bg-red-500 
              text-white text-[11px] px-1 rounded">
              sale!
                    </span>
                    </span>
              `;
              });
          }

        } catch (error) {
          console.error("오류 발생:", error);
        }
      });
    </script>
   
  </body>
</html>
